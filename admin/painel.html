<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Invictus Barber | Painel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Oswald:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #060606;
        --panel: rgba(16, 16, 16, 0.78);
        --panel-strong: rgba(24, 22, 18, 0.94);
        --gold: #d7b46a;
        --gold-soft: rgba(215, 180, 106, 0.18);
        --text: #f6f0e6;
        --muted: #a9a199;
        --line: rgba(215, 180, 106, 0.18);
        --danger: #ff7a7a;
        --success: #8ee0a1;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        background:
          radial-gradient(circle at 18% 10%, rgba(215, 180, 106, 0.14), transparent 34%),
          linear-gradient(140deg, #030303 0%, #12110f 54%, #060606 100%);
        color: var(--text);
        font-family: Inter, system-ui, sans-serif;
      }

      .admin-shell {
        width: min(1180px, calc(100% - 32px));
        margin: 0 auto;
        padding: 28px 0 48px;
      }

      .admin-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 18px;
        padding: 18px 0 30px;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 14px;
        color: inherit;
        text-decoration: none;
      }

      .brand__mark {
        width: 48px;
        height: 48px;
        display: grid;
        place-items: center;
        border: 1px solid var(--line);
        color: var(--gold);
        font-family: Oswald, sans-serif;
        font-size: 22px;
        font-weight: 700;
      }

      .brand strong,
      h1,
      .metric strong {
        font-family: Oswald, sans-serif;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      .brand strong {
        display: block;
        font-size: 22px;
      }

      .brand small,
      .admin-subtitle,
      .metric span,
      .booking-card small,
      [data-panel-status] {
        color: var(--muted);
      }

      .logout {
        border: 1px solid var(--line);
        background: rgba(0, 0, 0, 0.24);
        color: var(--text);
        padding: 12px 16px;
        font: inherit;
        font-weight: 800;
        cursor: pointer;
      }

      .hero-panel {
        display: grid;
        gap: 10px;
        margin-bottom: 24px;
      }

      h1 {
        margin: 0;
        font-size: clamp(36px, 7vw, 72px);
        line-height: 0.94;
      }

      .dashboard {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 14px;
        margin: 24px 0;
      }

      .metric,
      .booking-card,
      .empty-state {
        border: 1px solid var(--line);
        background: linear-gradient(150deg, var(--panel), var(--panel-strong));
        box-shadow: 0 18px 58px rgba(0, 0, 0, 0.34);
        backdrop-filter: blur(16px);
      }

      .metric {
        padding: 20px;
      }

      .metric strong {
        display: block;
        margin-top: 8px;
        color: var(--gold);
        font-size: 38px;
      }

      .panel-tools {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin: 28px 0 16px;
      }

      .panel-tools h2 {
        margin: 0;
        font-size: 18px;
      }

      .booking-list {
        display: grid;
        gap: 12px;
      }

      .booking-card {
        display: grid;
        grid-template-columns: 1.2fr 1.1fr 0.8fr 0.7fr 0.8fr auto;
        gap: 14px;
        align-items: center;
        padding: 16px;
      }

      .booking-card strong {
        display: block;
        margin-bottom: 4px;
      }

      .status-pill {
        display: inline-flex;
        width: fit-content;
        border: 1px solid var(--line);
        padding: 7px 10px;
        color: var(--gold);
        background: var(--gold-soft);
        font-size: 12px;
        font-weight: 900;
        text-transform: uppercase;
      }

      .actions {
        display: flex;
        gap: 8px;
      }

      .action {
        width: 42px;
        height: 42px;
        border: 1px solid var(--line);
        color: var(--text);
        background: rgba(0, 0, 0, 0.25);
        font: inherit;
        font-size: 18px;
        font-weight: 900;
        cursor: pointer;
      }

      .action--complete {
        color: var(--success);
      }

      .action--cancel {
        color: var(--danger);
      }

      .action:disabled {
        cursor: not-allowed;
        opacity: 0.42;
      }

      .empty-state {
        padding: 28px;
        color: var(--muted);
      }

      @media (max-width: 860px) {
        .admin-top,
        .panel-tools {
          align-items: flex-start;
          flex-direction: column;
        }

        .dashboard,
        .booking-card {
          grid-template-columns: 1fr;
        }

        .actions {
          justify-content: flex-start;
        }
      }
    </style>
  </head>
  <body>
    <main class="admin-shell">
      <header class="admin-top">
        <a class="brand" href="../index.html" aria-label="Invictus Barber">
          <span class="brand__mark">IB</span>
          <span>
            <strong>Invictus</strong>
            <small>Barber Studio</small>
          </span>
        </a>
        <button class="logout" type="button" data-admin-logout>Sair</button>
      </header>

      <section class="hero-panel">
        <span class="admin-subtitle" data-admin-kicker>Painel individual</span>
        <h1 data-admin-title>Agenda</h1>
        <p class="admin-subtitle">Controle seus atendimentos, finalize servicos e libere horarios cancelados.</p>
      </section>

      <section class="dashboard" aria-label="Resumo da agenda">
        <article class="metric">
          <span>Agendamentos Hoje</span>
          <strong data-metric-today>0</strong>
        </article>
        <article class="metric">
          <span>Pendentes</span>
          <strong data-metric-pending>0</strong>
        </article>
        <article class="metric">
          <span>Concluidos</span>
          <strong data-metric-completed>0</strong>
        </article>
      </section>

      <section>
        <div class="panel-tools">
          <h2>Agendamentos</h2>
          <div data-panel-status role="status" aria-live="polite">Carregando agenda...</div>
        </div>
        <div class="booking-list" data-booking-list></div>
      </section>
    </main>

    <script type="module" src="../assets/js/admin-panel.js"></script>
  </body>
</html>
