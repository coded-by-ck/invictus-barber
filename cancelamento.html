<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Invictus Barber | Cancelamento</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Oswald:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #070707;
        --panel: rgba(18, 18, 18, 0.78);
        --panel-strong: rgba(25, 23, 19, 0.94);
        --gold: #d7b46a;
        --gold-soft: rgba(215, 180, 106, 0.2);
        --text: #f7f1e8;
        --muted: #aaa39a;
        --line: rgba(215, 180, 106, 0.2);
        --danger: #ff7a7a;
        --success: #8ee0a1;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at 22% 18%, rgba(215, 180, 106, 0.14), transparent 34%),
          linear-gradient(145deg, #030303 0%, #12110f 54%, #050505 100%);
        color: var(--text);
        font-family: Inter, system-ui, sans-serif;
      }

      .cancel-shell {
        width: min(560px, 100%);
        border: 1px solid var(--line);
        background: linear-gradient(160deg, var(--panel), var(--panel-strong));
        box-shadow: 0 30px 90px rgba(0, 0, 0, 0.48);
        backdrop-filter: blur(18px);
        padding: 30px;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 14px;
        color: inherit;
        text-decoration: none;
        margin-bottom: 30px;
      }

      .brand__mark {
        width: 48px;
        height: 48px;
        display: grid;
        place-items: center;
        border: 1px solid var(--line);
        color: var(--gold);
        font-family: Oswald, sans-serif;
        font-size: 22px;
        font-weight: 700;
      }

      .brand strong,
      h1 {
        font-family: Oswald, sans-serif;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      .brand strong {
        display: block;
        font-size: 22px;
      }

      .brand small,
      p,
      dt {
        color: var(--muted);
      }

      h1 {
        margin: 0 0 10px;
        font-size: clamp(34px, 8vw, 58px);
        line-height: 0.96;
      }

      dl {
        display: grid;
        gap: 12px;
        margin: 26px 0;
        padding: 18px;
        border: 1px solid var(--line);
        background: rgba(0, 0, 0, 0.2);
      }

      dl div {
        display: flex;
        justify-content: space-between;
        gap: 18px;
      }

      dt {
        font-size: 13px;
        font-weight: 800;
        text-transform: uppercase;
      }

      dd {
        margin: 0;
        text-align: right;
        font-weight: 800;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      button,
      .home-link {
        border: 1px solid var(--line);
        padding: 14px 16px;
        color: var(--text);
        background: rgba(0, 0, 0, 0.22);
        font: inherit;
        font-weight: 900;
        cursor: pointer;
        text-decoration: none;
        text-transform: uppercase;
      }

      button {
        border: 0;
        background: linear-gradient(135deg, #f0d28a, #a77a2f);
        color: #130f09;
      }

      button:disabled {
        cursor: wait;
        opacity: 0.68;
      }

      [data-cancel-status] {
        min-height: 22px;
        margin-top: 18px;
        color: var(--muted);
      }

      [data-cancel-status][data-type="error"] {
        color: var(--danger);
      }

      [data-cancel-status][data-type="success"] {
        color: var(--success);
      }

      [hidden] {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <main class="cancel-shell">
      <a class="brand" href="index.html" aria-label="Invictus Barber">
        <span class="brand__mark">IB</span>
        <span>
          <strong>Invictus</strong>
          <small>Barber Studio</small>
        </span>
      </a>

      <h1>Cancelar agendamento</h1>
      <p data-cancel-copy>Validando seu link de cancelamento.</p>

      <section data-booking-details hidden>
        <dl>
          <div>
            <dt>Cliente</dt>
            <dd data-detail-client>-</dd>
          </div>
          <div>
            <dt>Barbeiro</dt>
            <dd data-detail-barber>-</dd>
          </div>
          <div>
            <dt>Servico</dt>
            <dd data-detail-service>-</dd>
          </div>
          <div>
            <dt>Data</dt>
            <dd data-detail-date>-</dd>
          </div>
          <div>
            <dt>Horario</dt>
            <dd data-detail-time>-</dd>
          </div>
        </dl>

        <p>Deseja cancelar seu agendamento?</p>
        <div class="actions">
          <button type="button" data-cancel-confirm>Cancelar agendamento</button>
          <a class="home-link" href="index.html">Voltar</a>
        </div>
      </section>

      <div data-cancel-status role="status" aria-live="polite"></div>
    </main>

    <script type="module" src="assets/js/cancel-booking.js"></script>
  </body>
</html>
